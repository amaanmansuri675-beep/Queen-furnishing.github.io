</html><!-- ===================== item.html ===================== --><!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queen Furnishing - Items</title>
<style>
body {margin:0;font-family:Arial;background:#fafafa;}
header {background:#6a1b9a;color:white;padding:15px;text-align:center;}
.items {display:flex;flex-wrap:wrap;justify-content:center;}
.card {
  background:white;
  width:250px;
  margin:15px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  text-align:center;
}
.card img {width:100%;border-radius:10px;}
button {
  background:#6a1b9a;color:white;border:none;padding:10px;border-radius:5px;margin-top:10px;
}
select {padding:5px;margin-top:5px;}
</style>
</head>
<body><header>
<h1>Our Products</h1>
</header><div class="items"><div class="card">
<img src="https://via.placeholder.com/250" alt="Cushion">
<h3>Luxury Cushion</h3>
<p>Price: ₹499</p>
<select>
<option>Select Quantity</option>
<option>1</option>
<option>2</option>
<option>3</option>
</select>
<button onclick="buyItem('Cushion')">Buy Now</button>
</div><div class="card">
<img src="https://via.placeholder.com/250" alt="Curtains">
<h3>Designer Curtains</h3>
<p>Price: ₹1499</p>
<select>
<option>Select Quantity</option>
<option>1</option>
<option>2</option>
</select>
<button onclick="buyItem('Curtains')">Buy Now</button>
</div><div class="card">
<img src="https://via.placeholder.com/250" alt="Wall Decor">
<h3>Wall Decor</h3>
<p>Price: ₹999</p>
<select>
<option>Select Quantity</option>
<option>1</option>
<option>2</option>
</select>
<button onclick="buyItem('Wall Decor')">Buy Now</button>
</div></div><script>
function buyItem(item) {
  let payment = prompt("Choose Payment Method: UPI / Card / Cash on Delivery");
  if(payment) {
    alert(item + " ordered successfully via " + payment);
  } else {
    alert("Order cancelled");
  }
}
</script></body>
</html>
